<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Orçamento</title>
  <script src="requestBudget.js" defer></script>
</head>
<body>
  <h1>Solicitar Orçamento</h1>
  <form id="budgetForm">
    <label for="name">Nome:</label>
    <input type="text" id="name" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" required><br><br>

    <label for="details">Detalhes do Orçamento:</label>
    <textarea id="details" required></textarea><br><br>

    <button type="submit">Enviar</button>
  </form>
  <script src="../js/requestBudget.js" defer></script>
</body>
</html>
