<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Orçamento</title>

  <link rel="stylesheet" href="../css/requestBudget.css">
  <script src="../js/requestBudget.js" defer></script>
</head>

<body class="requestBudget">

  <header class="header">
    <div class="container header-container">
      
      <!-- LOGO -->
      <div class="logo">
        <img src="../assets/image/horus-logo.png" alt="ENG3D Logo">
      </div>

      <!-- MENU CENTRAL -->
      <nav class="nav">
        <ul>
          <li><a href="../index.html">Início</a></li>
          <li><a href="moreProducts.html">Produtos</a></li>
          <li><a href="aboutUs.html">Sobre</a></li>
          <li><a href="../index.html">Contato</a></li>
        </ul>
      </nav>

      <!-- AÇÕES DIREITA -->
      <div class="header-actions">

        <button class="theme-toggle">
          <span class="theme-icon">🌙</span>
        </button>

        <!-- LOGIN/LOGOUT ICON -->
        <div class="login-icon" style="position:relative;">
          <i class="fa-solid fa-user" id="loginIcon" style="cursor:pointer; font-size:24px;"></i>

          <!-- Card escondido por padrão -->
          <div id="loginCard" class="login-card" style="display:none; position:absolute; right:0; top:40px; background:#fff; border:1px solid #ccc; padding:10px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.2); z-index:1000;">
              <button id="btnLogin" style="display:none; margin-bottom:5px; width:100%; padding:8px; background:#4caf50; color:#fff; border:none; border-radius:4px; cursor:pointer;">Entrar</button>
              <button id="btnLogout" style="display:none; width:100%; padding:8px; background:#f44336; color:#fff; border:none; border-radius:4px; cursor:pointer;">Sair</button>
          </div>
        </div>

      </div>
    </div>
  </header>


  <div class="requestBudget-container">
    <h1>Solicitar Orçamento</h1>

    <form id="budgetForm">
      
      <label for="name">Nome:</label>
      <input type="text" id="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" required>

      <label for="details">Detalhes do Orçamento:</label>
      <textarea id="details" required></textarea>

      <button type="submit">Enviar</button>

    </form>
  </div>


  <footer>
    <div class="footer-bottom">
      © 2026 Santos Engineering — Todos os direitos reservados.
    </div>
  </footer>

</body>
</html>
