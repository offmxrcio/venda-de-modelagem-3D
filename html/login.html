<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login | Engenharia3D</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">

    <div class="login-container">
        <h2>Faça um login ou crie sua conta</h2>
        <h4>Você pode fazer o login usando sua conta google</h4>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Senha" required>

        <button type="submit">Entrar</button>
        <p id="message" style="margin-top:10px; font-weight: bold;"></p>
    </form>

        <p>Não tem conta? <a href="register.html" id="createAccount">Criar conta</a></p>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
